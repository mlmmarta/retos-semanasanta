<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semana Santa DOM Challenge</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      transition: 0.3s;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .dark {
      background: #111;
      color: #eee;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    section {
      margin-bottom: 30px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

    ul li {
      cursor: pointer;
      padding: 5px;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
    }

    #moverBtn {
      position: relative;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

<header>
  <h1>🕯️ Semana Santa DOM Challenge 🕯️</h1>
  <button id="darkMode">🌙 Modo oscuro</button>
</header>

<div class="container">

  <!-- 1 TEXT -->
  <section>
    <h2 id="title">Reto DOM Semana Santa</h2>
    <button id="changeText">Cambiar texto</button>
  </section>

  <!-- 2 COLOR -->
  <section>
    <h2>Cambiar fondo</h2>
    <button onclick="document.body.style.background='white'">Blanco</button>
    <button onclick="document.body.style.background='lightgray'">Gris</button>
    <button onclick="document.body.style.background='beige'">Beige</button>
  </section>

  <!-- 3 COUNTER -->
  <section>
    <h2>Contador</h2>
    <p id="count">0</p>
    <button id="btnCount">+1</button>
  </section>

  <!-- 4 TOGGLE -->
  <section>
    <h2>Mostrar / Ocultar</h2>
    <p id="text">👤 Nazareno en procesión</p>
    <button id="toggle">Toggle</button>
  </section>

  <!-- 5 LIST -->
  <section>
    <h2>Lista de penitentes</h2>
    <input id="inputList" placeholder="Añadir..." />
    <button id="add">Añadir</button>
    <button id="clear">Limpiar</button>
    <ul id="list"></ul>
  </section>

  <!-- 6 CARDS -->
  <section>
    <h2>Tarjetas de pasos</h2>
    <input id="cardTitle" placeholder="Título" />
    <input id="cardDesc" placeholder="Descripción" />
    <button id="createCard">Crear</button>
    <div id="cards"></div>
  </section>

  <!-- 7 MOVER BOTÓN -->
  <section>
    <h2>El botón huidizo</h2>
    <button id="moverBtn">Atrápame 🐇</button>
  </section>

  <!-- 8 TIMER -->
  <section>
    <h2>Temporizador</h2>
    <p id="timer">0</p>
  </section>

  <!-- 9 RETO ALEATORIO -->
  <section>
    <h2>Reto aleatorio</h2>
    <button id="random">Generar reto</button>
    <p id="reto"></p>
  </section>

</div>


<script src="script.js"></script>
</script>

</body>
</html>
